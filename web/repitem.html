<!DOCTYPE html>
<html>
<head>
<title>Item Wise Sales Report</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #f4f7fb;
    }

    .report-box{
        width: 380px;
        margin: 95px auto;
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 8px;
        box-shadow: 0 5px 12px rgba(0,0,0,0.14);
    }

    .report-box h2{
        text-align: center;
        margin-bottom: 25px;
        color: #2d3436;
    }

    label{
        font-weight: bold;
        color: #555;
        display: block;
        margin-bottom: 8px;
    }

    input[type="text"]{
        width: 100%;
        padding: 9px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input[type="submit"]{
        width: 100%;
        margin-top: 22px;
        padding: 10px;
        background: #6f42c1;
        border: none;
        color: white;
        font-size: 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    input[type="submit"]:hover{
        background: #59339d;
    }
</style>
</head>

<body>

<div class="report-box">
    <h2>Item Wise Sales Report</h2>

    <form action="report">
        <input type="hidden" name="type" value="item">

        <label>Medicine Name</label>
        <input type="text" name="med" placeholder="Enter medicine name" required>

        <input type="submit" value="View Report">
    </form>
</div>

</body>
</html>
