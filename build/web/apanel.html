}

   .dropdown-content {

    z-index: 1;
        }

         }

/* Show dropdown on hover */
.dropdown:hover .dropdown-content {
    display: block;
     }

/* Hover inside dropdown */
.dropdown-content li a:hover {
    background: beige;
     }
