<!DOCTYPE html>
<html>
<head>
    <title>Update Medicine</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Page heading */
        h3{
            margin-top: 40px;
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
        }

        hr{
            width: 60%;
            margin: 15px 0 30px;
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #cbd5f5, transparent);
        }

        /* Form card */
        form{
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* Table */
        table{
            border-collapse: separate;
            border-spacing: 0 12px;
            border: none;
        }

        th{
            text-align: left;
            padding: 8px 12px;
            color: #1e293b;
            font-weight: 600;
        }

        /* Input */
        input[type="text"]{
            width: 240px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5f5;
            outline: none;
            font-size: 14px;
        }

        input[type="text"]:focus{
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.25);
        }

        /* Buttons */
        input[type="submit"],
        input[type="reset"]{
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }

        input[type="submit"]{
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #ffffff;
        }

        input[type="submit"]:hover{
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(14,165,233,0.4);
        }

        input[type="reset"]{
            background: #e5e7eb;
            color: #111827;
        }

        input[type="reset"]:hover{
            background: #d1d5db;
        }
    </style>
</head>

<body>

    <h3>Enter Medicine ID to Update Quantity</h3>
    <hr>

    <form action="Cupdate">
        <table>
            <tr>
                <th>customer ID</th>
                <td><input type="text" name="n1" placeholder="Enter medicine id"></td>
            </tr>
            <tr>
                <th>mobile no</th>
                <td><input type="text" name="n2" placeholder="Enter new quantity"></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Update">
                    <input type="reset">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
