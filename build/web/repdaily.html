<!DOCTYPE html>
<html>
<head>
<title>Daily Sales Report</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #f3f5f8;
    }

    .report-box{
        width: 360px;
        margin: 100px auto;
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .report-box h2{
        text-align: center;
        margin-bottom: 25px;
        color: #34495e;
    }

    label{
        font-weight: bold;
        color: #555;
        display: block;
        margin-bottom: 8px;
    }

    input[type="date"]{
        width: 100%;
        padding: 9px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input[type="submit"]{
        width: 100%;
        margin-top: 22px;
        padding: 10px;
        background: #17a2b8;
        border: none;
        color: white;
        font-size: 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    input[type="submit"]:hover{
        background: #117a8b;
    }
</style>
</head>

<body>

<div class="report-box">
    <h2>Daily Sales Report</h2>

    <form action="report">
        <input type="hidden" name="type" value="daily">

        <label>Select Date</label>
        <input type="date" name="date" required>

        <input type="submit" value="View Report">
    </form>
</div>

</body>
</html>
